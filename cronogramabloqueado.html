<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <title>MINISTERIO DE ALABANZA</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Montserrat;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .btn-home {
            position: absolute;
            top: 16px;
            left: 16px;
            background: #2c3e50;
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            transition: 0.3s;
            z-index: 10;
        }

        .btn-home:hover {
            background: #1abc9c;
        }

        .logo {
            margin-top: 70px;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
        }

        h1 {
            margin-top: 12px;
            font-size: 18px;
            text-align: center;
            letter-spacing: 1px;
            padding: 0 16px;
        }

        .container {
            width: 100%;
            max-width: 960px;
            padding: 0 14px;
            margin-top: 10px;
            margin-bottom: 40px;
        }

        .semana-bloque {
            background: #1c2b33;
            border-radius: 14px;
            padding: 18px 14px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .semana-bloque h2 {
            text-align: center;
            margin-top: 0;
            color: #00c9a7;
            font-size: 15px;
            letter-spacing: 0.5px;
        }

        .seccion-titulo {
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            margin: 16px 0 6px;
            color: #a8d8ea;
        }

        .tabla-scroll {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: 6px;
        }

        table {
            width: 100%;
            min-width: 400px;
            border-collapse: collapse;
            font-size: 12px;
        }

        th, td {
            padding: 8px 6px;
            border: 1px solid #2f4b57;
            text-align: center;
            white-space: nowrap;
        }

        th {
            background: #2c5364;
            font-size: 11px;
        }

        td {
            background: #314e59;
        }

        td.ocupado {
            background: #ff6b6b;
            font-weight: 600;
        }

        footer {
            margin-top: auto;
            text-align: center;
            padding: 20px;
            font-size: 13px;
            opacity: 0.85;
        }

        .mensaje {
            text-align: center;
            margin-top: 60px;
            opacity: 0.75;
            padding: 0 20px;
        }

        .mensaje .icono {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .mensaje p {
            font-size: 15px;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <a href="index.html" class="btn-home">🏠 Inicio</a>

    <img src="logo.jpg" class="logo">
    <h1>📅 CRONOGRAMA MENSUAL</h1>

    <div class="container" id="contenedor">
        <div class="mensaje">
            <div class="icono">⏳</div>
            <p>Cargando cronograma...</p>
        </div>
    </div>

    <footer>
         APP DE PLANIFICACIÓN - MINISTERIO DE ALABANZA BELEN CENTRAL
        <br>
        <em>By GioApp</em>
        <br>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, getDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAt8MkqaV_sZimt2HVhTc8OKz8gKmoTRnE",
            authDomain: "programador-banda.firebaseapp.com",
            projectId: "programador-banda",
            storageBucket: "programador-banda.firebasestorage.app",
            messagingSenderId: "115612679276",
            appId: "1:115612679276:web:7bb4c3897226134909ec49"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const semanas = [
            {
                descripcion: "Semana del 2 al 5 de abril",
                fechas: ["Jueves 2 de abril", "Sábado 4 de abril", "Domingo 5 de abril (8:30AM)", "Domingo 5 de abril (10:30AM)", ""]
            },
            {
                descripcion: "Semana del 7 al 12 de abril",
                fechas: ["Martes 7 de abril", "Jueves 9 de abril", "Sábado 11 de abril", "Domingo 12 de abril (8:30AM)", "Domingo 12 de abril (10:30AM)"]
            },
            {
                descripcion: "Semana del 14 al 19 de abril",
                fechas: ["Martes 14 de abril", "Jueves 16 de abril", "Sábado 18 de abril", "Domingo 19 de abril (8:30AM)", "Domingo 19 de abril (10:30AM)"]
            },
            {
                descripcion: "Semana del 21 al 26 de abril",
                fechas: ["Martes 21 de abril", "Jueves 23 de abril", "Sábado 25 de abril", "Domingo 26 de abril (8:30AM)", "Domingo 26 de abril (10:30AM)"]
            },
            {
                descripcion: "Semana del 28 al 30 de abril",
                fechas: ["Martes 28 de abril", "Jueves 30 de abril"]
            }
        ];

        const rolesVoces = ["Voz líder", "Voz apoyo", "Contralto", "Cuarta voz"];
        const rolesMusicos = ["Pianista", "Guitarrista", "Bajista", "Baterista"];

        async function init() {
            try {
                const configSnap = await getDoc(doc(db, "config", "cronograma"));

                if (!configSnap.exists() || !configSnap.data().publicado) {
                    document.getElementById("contenedor").innerHTML = `
                        <div class="mensaje">
                            <div class="icono">🔒</div>
                            <p>El cronograma aún no ha sido publicado.</p>
                        </div>`;
                    return;
                }

                // Está publicado, cargar datos
                onSnapshot(collection(db, "disponibilidades"), (snapshot) => {
                    const todos = [];
                    snapshot.forEach(d => todos.push(d.data()));
                    renderCronograma(todos);
                });

            } catch (e) {
                document.getElementById("contenedor").innerHTML = `
                    <div class="mensaje">
                        <div class="icono">⚠️</div>
                        <p>Error al cargar el cronograma. Intenta nuevamente.</p>
                    </div>`;
            }
        }

        function renderCronograma(todos) {
            const contenedor = document.getElementById("contenedor");
            contenedor.innerHTML = "";

            const datos = { voces: {}, musicos: {} };

            todos.forEach(data => {
                if (!data.tipo || !data.disponibilidad) return;
                const tipo = data.tipo.toLowerCase();
                if (tipo !== "voces" && tipo !== "musicos") return;

                data.disponibilidad.forEach(item => {
                    if (!datos[tipo][item.semana]) datos[tipo][item.semana] = [];
                    datos[tipo][item.semana].push({
                        nombre: data.nombre,
                        rol: item.rol,
                        dia: item.dia
                    });
                });
            });

            semanas.forEach(semana => {
                const tieneVoces = datos.voces[semana.descripcion];
                const tieneMusicos = datos.musicos[semana.descripcion];
                if (!tieneVoces && !tieneMusicos) return;

                const bloque = document.createElement('div');
                bloque.classList.add('semana-bloque');

                let h2 = document.createElement('h2');
                h2.textContent = semana.descripcion;
                bloque.appendChild(h2);

                if (tieneVoces) {
                    let tituloV = document.createElement('p');
                    tituloV.classList.add('seccion-titulo');
                    tituloV.textContent = "🎤 Voces";
                    bloque.appendChild(tituloV);
                    bloque.appendChild(crearTabla(semana, datos.voces[semana.descripcion] || [], rolesVoces));
                }

                if (tieneMusicos) {
                    let tituloM = document.createElement('p');
                    tituloM.classList.add('seccion-titulo');
                    tituloM.textContent = "🎸 Músicos";
                    bloque.appendChild(tituloM);
                    bloque.appendChild(crearTabla(semana, datos.musicos[semana.descripcion] || [], rolesMusicos));
                }

                contenedor.appendChild(bloque);
            });

            if (contenedor.innerHTML === "") {
                contenedor.innerHTML = `
                    <div class="mensaje">
                        <div class="icono">📭</div>
                        <p>No hay disponibilidades registradas aún.</p>
                    </div>`;
            }
        }

        function crearTabla(semana, reservas, listaRoles) {
            const wrapper = document.createElement('div');
            wrapper.classList.add('tabla-scroll');

            let table = document.createElement('table');
            let thead = document.createElement('thead');
            let headerRow = document.createElement('tr');

            let thRol = document.createElement('th');
            thRol.textContent = "Rol";
            headerRow.appendChild(thRol);

            semana.fechas.forEach(fecha => {
                let th = document.createElement('th');
                th.textContent = fecha;
                headerRow.appendChild(th);
            });

            thead.appendChild(headerRow);
            table.appendChild(thead);

            let tbody = document.createElement('tbody');
            listaRoles.forEach(rol => {
                let fila = document.createElement('tr');

                let rolTd = document.createElement('td');
                rolTd.textContent = rol;
                fila.appendChild(rolTd);

                semana.fechas.forEach(fecha => {
                    let td = document.createElement('td');
                    const coincidentes = reservas.filter(r => r.rol === rol && r.dia === fecha);
                    if (coincidentes.length > 0) {
                        td.classList.add('ocupado');
                        coincidentes.forEach(r => {
                            const span = document.createElement('span');
                            span.textContent = r.nombre;
                            span.style.cssText = 'display:block; font-size:11px; line-height:1.6;';
                            td.appendChild(span);
                        });
                    }
                    fila.appendChild(td);
                });

                tbody.appendChild(fila);
            });

            table.appendChild(tbody);
            wrapper.appendChild(table);
            return wrapper;
        }

        init();
    </script>
</body>

</html>
