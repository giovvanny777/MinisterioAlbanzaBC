<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <title>MINISTERIO DE ALABANZA</title>

    <!-- Fuente moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            width: 200px;
            margin: 0 auto 25px auto;
            border-radius: 50%;
            display: block;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.15);
            animation: pulse 2.4s ease-in-out infinite;
         }   
          
        @keyframes pulse {
    0%   { transform: scale(1);    box-shadow: 0 0 0 0 rgba(0,201,167,0.45); }
    50%  { transform: scale(1.06); box-shadow: 0 0 0 12px rgba(0,201,167,0); }
    100% { transform: scale(1);    box-shadow: 0 0 0 0 rgba(0,201,167,0); }
        }

        h1 {
            font-size: 22px;
            margin-bottom: 40px;
        }

        .menu-button {
            width: 100%;
            padding: 18px;
            margin: 12px 0;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .plan {
            background: #00c9a7;
        }

        .view {
            background: #ffc75f;
        }

        .admin {
            background: #00c9a7;
        }

        .menu-button:hover {
            transform: scale(1.05);
        }

        footer {
            text-align: center;
            padding: 18px 20px;
            margin-top: 30px;
            font-size: 8px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

    <div class="container">

        <img src="logo.jpg" class="logo">


        <button class="menu-button plan" onclick="irPlanificador()">
            AGENDA TU DISPONIBILIDAD AQUI
        </button>

        <button class="menu-button view" onclick="verCronograma()">
            VER CRONOGRAMA ACTUAL
        </button>

        <button class="menu-button admin" onclick="panelLider()">
            DIRECTIVA DE ALABANZA
        </button>

        <footer>
             APP DE PLANIFICACIÓN - MINISTERIO DE ALABANZA BELEN CENTRAL
             <br>
                <em>By GioApp</em>
              <br>
        </footer>

    </div>

    <script>

        function irPlanificador() {
            window.location.href = "planificador.html"
        }

        function verCronograma() {
            window.location.href = "cronograma.html"
        }

        function panelLider() {
            window.location.href = "directiva.html"
        }

    </script>

</body>

</html>
